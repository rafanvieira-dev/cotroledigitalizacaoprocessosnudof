<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Digitalização de Processos - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tabela com layout fixo para uniformidade */
        .tabela-docs-arquivamento { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            font-size: 0.82em; 
            table-layout: fixed; /* Garante que as larguras das colunas sejam respeitadas */
        }
        
        .tabela-docs-arquivamento th { 
            background: var(--primary); 
            color: white; 
            padding: 12px 5px; 
            border: 1px solid var(--border); 
            text-align: center; 
            vertical-align: middle;
            word-wrap: break-word; /* Permite quebra de linha no cabeçalho se necessário */
        }

        .tabela-docs-arquivamento td { 
            padding: 8px 4px; 
            border: 1px solid var(--border); 
            vertical-align: middle; 
            text-align: center;
        }

        input, select { 
            width: 100%; 
            padding: 8px 5px; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            font-size: 1em;
        }

        /* Classes de definição de largura para uniformidade */
        .col-proc { width: 16%; text-align: left !important; }
        .col-data { width: 12%; }
        .col-qnt { width: 10%; }
        .col-anexo { width: 11%; }
        .col-obs { width: 29%; }

        /* Estilo para campos numéricos centralizados */
        input[type="number"] { text-align: center; }
    </style>
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE DE DIGITALIZAÇÃO PROCESSOS NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="processos.html">📄 Inserir Processos</a>
                <a href="digitalizacao.html" class="ativo">🖨️ Digitalização e SEI</a>
                <a href="arquivamentoFisico.html">🗄️ Arquivar Físico</a>
                <a href="acervo.html">📚 Consulta de Acervo</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Digitalização e Inserção no SEI</h2>
            <div id="listaParaArquivar"><p>A procurar guias abertas...</p></div>
        </main>
    </div>

    <div id="modalArquivar" class="modal">
        <div class="modal-content" style="width: 98%; max-width: 1400px;">
            <span class="close-btn" id="closeArquivar" style="float: right; cursor: pointer; font-size: 1.5em; color: var(--text-dark);">&times;</span>
            <h3 id="tituloModalArquivar" style="margin-bottom: 15px; color: var(--primary);"></h3>
            <form id="formDadosArquivamento">
                <div style="background: var(--bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto;">
                    <div id="areaDocumentosArquivar"></div>
                </div>
                <button type="submit" class="btn-primary" id="btnConfirmarArq" style="margin-top:15px;">✅ CONCLUIR DIGITALIZAÇÃO</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        let guiaAtualId = "";
        let processosDaGuia = [];

        window.replicarDadosPrimeiraLinha = (tipo, valor) => {
            processosDaGuia.forEach((id, index) => {
                if (index > 0) {
                    const input = document.getElementById(`${tipo}_${id}`);
                    if (input) input.value = valor;
                }
            });
        };

        async function carregar() {
            const container = document.getElementById("listaParaArquivar");
            try {
                const q = query(collection(db, "guias"), where("status", "==", "Aberta"));
                const snap = await getDocs(q);
                let guias = [];
                for (const d of snap.docs) {
                    const procsSnap = await getDocs(collection(db, "guias", d.id, "processos"));
                    if (procsSnap.size > 0) guias.push({ id: d.id, ...d.data() });
                }
                
                container.innerHTML = guias.length === 0 ? "<p>Nenhuma guia pronta para digitalização.</p>" : ""; 
                
                guias.forEach(g => {
                    const div = document.createElement("div"); 
                    div.className = "guia-card";
                    div.style.borderLeftColor = "var(--secondary)";
                    div.innerHTML = `
                        <div class="guia-info">
                            <h4>Guia: ${g.numero}</h4>
                            <p><strong>Unidade:</strong> ${g.unidade}</p>
                        </div>
                        <button onclick="window.abrirDigitalizacao('${g.id}', '${g.numero}')" 
                                style="background:var(--secondary); color:white; padding:10px 20px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">
                            🖨️ Iniciar Digitalização
                        </button>`;
                    container.appendChild(div);
                });
            } catch (err) { 
                console.error(err);
                container.innerHTML = `<p style="color:red;">Erro ao carregar guias.</p>`;
            }
        }

        window.abrirDigitalizacao = async (id, num) => {
            guiaAtualId = id; processosDaGuia = [];
            document.getElementById("tituloModalArquivar").innerText = "Digitalização - Guia: " + num;
            document.getElementById("modalArquivar").style.display = "block";
            try {
                const snap = await getDocs(collection(db, "guias", id, "processos"));
                let html = `<table class="tabela-docs-arquivamento">
                    <thead>
                        <tr>
                            <th class="col-proc">Nº Processo</th>
                            <th class="col-data">Data Digitalização.</th>
                            <th class="col-data">Data inserção SEI</th>
                            <th class="col-qnt">Qnt. Imagens digitalizadas</th>
                            <th class="col-anexo">Anexo</th>
                            <th class="col-qnt">Quant. de páginas do anexo</th>
                            <th class="col-obs">Observações</th>
                        </tr>
                    </thead><tbody>`;
                
                let index = 0;
                snap.forEach(docSnap => {
                    const procId = docSnap.id;
                    processosDaGuia.push(procId);
                    const p = docSnap.data();
                    
                    const eventoDig = index === 0 ? `oninput="window.replicarDadosPrimeiraLinha('dataDig', this.value)"` : "";
                    const eventoSei = index === 0 ? `oninput="window.replicarDadosPrimeiraLinha('dataSei', this.value)"` : "";

                    html += `<tr>
                        <td class="col-proc"><b>${p.numeroProcessoFisico}</b></td>
                        <td><input type="date" id="dataDig_${procId}" ${eventoDig} required></td>
                        <td><input type="date" id="dataSei_${procId}" ${eventoSei} required></td>
                        <td><input type="number" id="qtdImg_${procId}" required min="1"></td>
                        <td>
                            <select id="anexo_${procId}">
                                <option value="Nenhum">Nenhum</option>
                                <option value="PAPEL">PAPEL</option>
                                <option value="CD">CD</option>
                                <option value="DVD">DVD</option>
                                <option value="Pen Drive">Pen Drive</option>
                            </select>
                        </td>
                        <td><input type="number" id="pgAnexo_${procId}" min="0"></td>
                        <td><input type="text" id="obs_${procId}" placeholder="Opcional..."></td>
                    </tr>`;
                    index++;
                });
                document.getElementById("areaDocumentosArquivar").innerHTML = html + "</tbody></table>";
            } catch (e) { console.error(e); }
        };

        document.getElementById("formDadosArquivamento").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnConfirmarArq");
            btn.disabled = true;
            btn.innerText = "A guardar dados...";
            
            try {
                const promessas = processosDaGuia.map(id => updateDoc(doc(db, "guias", guiaAtualId, "processos", id), {
                    dataDigitalizacao: document.getElementById(`dataDig_${id}`).value,
                    dataInsercaoSEI: document.getElementById(`dataSei_${id}`).value,
                    qtdImagensDigitalizadas: document.getElementById(`qtdImg_${id}`).value,
                    tipoAnexo: document.getElementById(`anexo_${id}`).value,
                    qtdPaginasAnexo: document.getElementById(`pgAnexo_${id}`).value || "0",
                    observacoes: document.getElementById(`obs_${id}`).value
                }));
                
                await Promise.all(promessas);
                
                await updateDoc(doc(db, "guias", guiaAtualId), { 
                    status: "Digitalizada", 
                    operadorDigitalizacao: auth.currentUser.email 
                });
                
                alert("Digitalização concluída com sucesso!"); 
                document.getElementById("modalArquivar").style.display = "none"; 
                carregar();
            } catch (err) { 
                console.error(err);
                alert("Erro ao salvar dados."); 
            } finally {
                btn.disabled = false;
                btn.innerText = "✅ CONCLUIR DIGITALIZAÇÃO";
            }
        };

        document.getElementById("closeArquivar").onclick = () => document.getElementById("modalArquivar").style.display = "none";
        onAuthStateChanged(auth, (user) => { if (user) carregar(); });
        document.getElementById("btnLogout").onclick = () => signOut(auth);
    </script>
</body>
</html>

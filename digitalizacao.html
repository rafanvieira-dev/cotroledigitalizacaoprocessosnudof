<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Digitalização de Processos - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabela-docs-arquivamento { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.82em; }
        .tabela-docs-arquivamento th, .tabela-docs-arquivamento td { padding: 8px; border: 1px solid var(--border); vertical-align: top; }
        input, select { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE DE DIGITALIZAÇÃO PROCESSOS NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="processos.html">📄 Inserir Processos</a>
                <a href="digitalizacao.html" class="ativo">🖨️ Digitalização e SEI</a>
                <a href="arquivamentoFisico.html">🗄️ Arquivar Físico</a>
                <a href="acervo.html">📚 Consulta de Acervo</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Digitalização e Inserção no SEI</h2>
            <div id="listaParaArquivar"><p>A procurar guias abertas...</p></div>
        </main>
    </div>

    <div id="modalArquivar" class="modal">
        <div class="modal-content" style="width: 98%; max-width: 1400px;">
            <span class="close-btn" id="closeArquivar" style="float: right; cursor: pointer; font-size: 1.5em; color: var(--text-dark);">&times;</span>
            <h3 id="tituloModalArquivar" style="margin-bottom: 15px; color: var(--primary);"></h3>
            <form id="formDadosArquivamento">
                <div style="background: var(--bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto;">
                    <div id="areaDocumentosArquivar"></div>
                </div>
                <button type="submit" class="btn-primary" id="btnConfirmarArq" style="margin-top:15px;">✅ CONCLUIR DIGITALIZAÇÃO</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        let guiaAtualId = "";
        let processosDaGuia = [];

        window.replicarDadosPrimeiraLinha = (tipo, valor) => {
            processosDaGuia.forEach((id, index) => {
                if (index > 0) {
                    const input = document.getElementById(`${tipo}_${id}`);
                    if (input) input.value = valor;
                }
            });
        };

        async function carregar() {
            const container = document.getElementById("listaParaArquivar");
            try {
                const q = query(collection(db, "guias"), where("status", "==", "Aberta"));
                const snap = await getDocs(q);
                let guias = [];
                for (const d of snap.docs) {
                    const procsSnap = await getDocs(collection(db, "guias", d.id, "processos"));
                    if (procsSnap.size > 0) guias.push({ id: d.id, ...d.data() });
                }
                container.innerHTML = guias.length === 0 ? "<p>Nenhuma guia pronta.</p>" : ""; 
                guias.forEach(g => {
                    const div = document.createElement("div"); 
                    div.className = "guia-card";
                    div.innerHTML = `
                        <div class="guia-info"><h4>Guia: ${g.numero}</h4><p>${g.unidade}</p></div>
                        <button onclick="window.abrirDigitalizacao('${g.id}', '${g.numero}')" style="background:var(--secondary); color:white; padding:10px; border-radius:4px; cursor:pointer;">🖨️ Digitalizar</button>`;
                    container.appendChild(div);
                });
            } catch (err) { console.error(err); }
        }

        window.abrirDigitalizacao = async (id, num) => {
            guiaAtualId = id; processosDaGuia = [];
            document.getElementById("tituloModalArquivar").innerText = "Digitalização - Guia: " + num;
            document.getElementById("modalArquivar").style.display = "block";
            try {
                const snap = await getDocs(collection(db, "guias", id, "processos"));
                let html = `<table class="tabela-docs-arquivamento"><thead><tr style="background:var(--primary); color:white;"><th>Nº Processo</th><th>Data Digit.</th><th>Data SEI</th><th>Imagens</th><th>Anexo</th><th>Págs</th></tr></thead><tbody>`;
                let index = 0;
                snap.forEach(docSnap => {
                    const procId = docSnap.id;
                    processosDaGuia.push(procId);
                    const eventoDig = index === 0 ? `oninput="window.replicarDadosPrimeiraLinha('dataDig', this.value)"` : "";
                    const eventoSei = index === 0 ? `oninput="window.replicarDadosPrimeiraLinha('dataSei', this.value)"` : "";
                    html += `<tr><td><b>${docSnap.data().numeroProcessoFisico}</b></td><td><input type="date" id="dataDig_${procId}" ${eventoDig} required></td><td><input type="date" id="dataSei_${procId}" ${eventoSei} required></td><td><input type="number" id="qtdImg_${procId}" required min="1"></td><td><select id="anexo_${procId}"><option value="Nenhum">Nenhum</option><option value="CD">CD</option><option value="DVD">DVD</option><option value="Pen Drive">Pen Drive</option></select></td><td><input type="number" id="pgAnexo_${procId}" min="0"></td></tr>`;
                    index++;
                });
                document.getElementById("areaDocumentosArquivar").innerHTML = html + "</tbody></table>";
            } catch (e) { console.error(e); }
        };

        document.getElementById("formDadosArquivamento").onsubmit = async (e) => {
            e.preventDefault();
            try {
                const promessas = processosDaGuia.map(id => updateDoc(doc(db, "guias", guiaAtualId, "processos", id), {
                    dataDigitalizacao: document.getElementById(`dataDig_${id}`).value,
                    dataInsercaoSEI: document.getElementById(`dataSei_${id}`).value,
                    qtdImagensDigitalizadas: document.getElementById(`qtdImg_${id}`).value,
                    tipoAnexo: document.getElementById(`anexo_${id}`).value,
                    qtdPaginasAnexo: document.getElementById(`pgAnexo_${id}`).value || "0"
                }));
                await Promise.all(promessas);
                await updateDoc(doc(db, "guias", guiaAtualId), { status: "Digitalizada", operadorDigitalizacao: auth.currentUser.email });
                document.getElementById("modalArquivar").style.display = "none"; carregar();
            } catch (err) { alert("Erro ao salvar."); }
        };

        document.getElementById("closeArquivar").onclick = () => document.getElementById("modalArquivar").style.display = "none";
        onAuthStateChanged(auth, (user) => { if (user) carregar(); });
        document.getElementById("btnLogout").onclick = () => signOut(auth);
    </script>
</body>
</html>

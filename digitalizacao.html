<script type="module">
    // ... imports existentes ...

    document.getElementById("formDadosArquivamento").onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnConfirmarArq");
        btn.disabled = true;
        btn.innerText = "Salvando...";

        try {
            // 1. Atualiza todos os processos primeiro
            const promessas = processosDaGuia.map(id => {
                const qtd = document.getElementById(`qtdImg_${id}`).value;
                if (!qtd || qtd <= 0) throw new Error("Qtd de imagens inválida");
                
                return updateDoc(doc(db, "guias", guiaAtualId, "processos", id), {
                    dataDigitalizacao: document.getElementById(`dataDig_${id}`).value,
                    dataInsercaoSEI: document.getElementById(`dataSei_${id}`).value,
                    qtdImagensDigitalizadas: qtd,
                    tipoAnexo: document.getElementById(`anexo_${id}`).value,
                    qtdPaginasAnexo: document.getElementById(`pgAnexo_${id}`).value || "0"
                });
            });

            await Promise.all(promessas);

            // 2. Só altera status da guia se os processos forem salvos com sucesso
            await updateDoc(doc(db, "guias", guiaAtualId), { 
                status: "Digitalizada", 
                operadorDigitalizacao: auth.currentUser.email,
                dataConclusaoDigitalizacao: new Date().toISOString()
            });

            alert("Digitalização concluída com sucesso!");
            document.getElementById("modalArquivar").style.display = "none";
            carregar();
        } catch (err) {
            console.error(err);
            alert("Erro: Verifique se todos os campos de imagens foram preenchidos.");
            btn.disabled = false;
            btn.innerText = "✅ CONCLUIR DIGITALIZAÇÃO";
        }
    };
</script>

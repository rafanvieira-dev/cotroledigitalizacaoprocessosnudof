<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Processos - NUDOF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginSection">
        <div class="form-container" style="margin: 50px auto; width: 400px; text-align: center;">
            <div style="background-color: var(--primary); color: white; padding: 15px; margin: -25px -25px 30px -25px; border-radius: 8px 8px 0 0; font-weight: bold;">SISTEMA DE PROCESSOS NUDOF</div>
            <h2 style="margin-bottom: 20px;">Acesso Restrito</h2>
            <button id="btnGoogle" class="btn-primary" style="background-color: #4285F4; width: 100%;">🌐 Entrar com Google</button>
            <p id="erroMsg" style="color: #e74c3c; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="appInterface" style="display: none;">
        <aside id="sidebar">
            <div class="sidebar-logo">PROCESSOS NUDOF</div>
            <nav>
                <a href="index.html" class="ativo">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="processos.html">📄 Inserir Processos</a>
                <a href="digitalizacao.html">🖨️ Digitalização e SEI</a>
                <a href="arquivamentoFisico.html">🗄️ Arquivar Físico</a>
                <a href="acervo.html">📚 Consulta de Acervo</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>
        <main id="content">
            <h2 class="page-title">Bem-vindo ao Sistema de Processos</h2>
            <div id="mainDisplay"></div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("appInterface").style.display = "flex";
                carregarHistorico();
            } else {
                document.getElementById("loginSection").style.display = "block";
                document.getElementById("appInterface").style.display = "none";
            }
        });

        document.getElementById("btnGoogle").onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch((error) => {
                document.getElementById("erroMsg").innerText = "Erro ao autenticar.";
            });
        };

        document.getElementById("btnLogout").onclick = () => signOut(auth);

        async function carregarHistorico() {
            const display = document.getElementById("mainDisplay");
            try {
                const q = query(collection(db, "guias"), orderBy("dataRecebimento", "desc"));
                const snap = await getDocs(q);
                if (snap.empty) { display.innerHTML = "<p>Nenhuma guia cadastrada.</p>"; return; }
                
                let html = "<h3 style='margin-bottom:20px; color:var(--primary);'>Histórico de Guias</h3>";
                snap.forEach(d => {
                    const g = d.data();
                    const statusClass = g.status.toLowerCase();
                    html += `
                        <div class="guia-card">
                            <div class="guia-info">
                                <h4>Guia: ${g.numero}</h4>
                                <p><strong>Unidade:</strong> ${g.unidade}</p>
                                <p><small>Recebida em: ${g.dataRecebimento} às ${g.horaRecebimento}</small></p>
                            </div>
                            <div class="status-badge status-${statusClass}">${g.status}</div>
                        </div>`;
                });
                display.innerHTML = html;
            } catch (e) { display.innerHTML = "Erro ao carregar histórico."; }
        }
    </script>
</body>
</html>

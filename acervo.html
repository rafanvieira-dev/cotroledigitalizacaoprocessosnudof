<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Acervo - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .guia-card-arquivada { background: var(--white); border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #7f8c8d; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .data-header-btn { width: 100%; color: white; padding: 12px; border: none; border-radius: 5px; text-align: left; font-weight: bold; margin: 10px 0 5px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .btn-caixa { background: var(--secondary); font-size: 1.1em; }
        .grupo-caixa { display: none; margin-bottom: 25px; padding-left: 15px; border-left: 3px dashed var(--border); margin-left: 10px; padding-top: 10px; }
        .contador-guias { background: var(--accent); color: #333; padding: 3px 12px; border-radius: 12px; font-size: 0.85em; margin-left: 10px; font-weight: bold; }
        .badge-user { font-size: 0.75em; color: #666; display: block; margin-top: 5px; }
        .filtros-relatorio { background: var(--white); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .input-busca { width: 100%; padding: 12px; border-radius: 6px; border: 2px solid var(--secondary); font-size: 1.1em; outline: none; }
    </style>
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE DE DIGITALIZAÇÃO PROCESSOS NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="processos.html">📄 Inserir Processos</a>
                <a href="digitalizacao.html">🖨️ Digitalização e SEI</a>
                <a href="arquivamentoFisico.html">🗄️ Arquivar Físico</a>
                <a href="acervo.html" class="ativo">📚 Consulta de Acervo</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Consulta de Acervo por Caixas Físicas</h2>
            <div class="filtros-relatorio">
                <label style="font-weight: bold; color: var(--primary); display: block; margin-bottom: 8px;">🔍 Busca Rápida (Guia ou Unidade):</label>
                <input type="text" id="buscaGuiaInput" class="input-busca" placeholder="Digite o Número da Guia ou Unidade..." oninput="window.filtrarAcervo()">
            </div>
            <div id="listaArquivadas"><p>Buscando acervo...</p></div>
        </main>
    </div>

    <div id="modalDetalhes" class="modal">
        <div class="modal-content" style="width: 95%; max-width: 1250px;">
            <span class="close-btn" id="closeModal" style="float: right; cursor: pointer; font-size: 1.5em;">&times;</span>
            <h3 id="modalTitulo" style="color: var(--primary); margin-bottom: 15px;"></h3>
            <div id="detalhesGuiaGrid"></div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, query, where, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const EMAILS_ADMIN = ["rafael.nascimento-vieira@defensoria.rj.def.br"];
        let isAdmin = false;
        let todasAsGuiasArquivadas = [];

        onAuthStateChanged(auth, (user) => { 
            if (!user) window.location.href = "index.html"; 
            else { isAdmin = EMAILS_ADMIN.includes(user.email); carregar(); }
        });
        
        document.getElementById("btnLogout").onclick = () => signOut(auth);

        async function carregar() {
            const container = document.getElementById("listaArquivadas");
            try {
                const q = query(collection(db, "guias"), where("status", "==", "Arquivada"));
                const snap = await getDocs(q);
                if(snap.empty) { container.innerHTML = "<p>Acervo vazio.</p>"; return; }
                todasAsGuiasArquivadas = [];
                snap.forEach(d => todasAsGuiasArquivadas.push({ id: d.id, ...d.data() }));
                renderizarAcervoPorCaixa(todasAsGuiasArquivadas);
            } catch (err) { container.innerHTML = "Erro ao carregar."; }
        }

        window.filtrarAcervo = () => {
            const termo = document.getElementById("buscaGuiaInput").value.toLowerCase();
            const filtradas = todasAsGuiasArquivadas.filter(g => (g.numero || "").toLowerCase().includes(termo) || (g.unidade || "").toLowerCase().includes(termo));
            renderizarAcervoPorCaixa(filtradas, true);
        };

        function renderizarAcervoPorCaixa(lista, expandir = false) {
            const container = document.getElementById("listaArquivadas");
            container.innerHTML = "";
            const caixas = {};
            
            lista.forEach(g => {
                const cxG = g.locCaixaGuia || "Sem Caixa";
                if (!caixas[cxG]) caixas[cxG] = [];
                caixas[cxG].push(g);
            });

            Object.keys(caixas).sort().forEach(cxG => {
                const btn = document.createElement("button");
                btn.className = "data-header-btn btn-caixa";
                btn.innerHTML = `<div><span>📦 Caixa de Guia: <strong>${cxG}</strong></span> <span class="contador-guias">${caixas[cxG].length} guias</span></div>`;
                
                const div = document.createElement("div");
                div.className = "grupo-caixa";
                if(expandir) div.style.display = "block";
                btn.onclick = () => div.style.display = div.style.display === "block" ? "none" : "block";

                caixas[cxG].forEach(g => {
                    const card = document.createElement("div");
                    card.className = "guia-card-arquivada";
                    card.innerHTML = `
                        <div><strong>Guia: ${g.numero}</strong><br><small>${g.unidade}</small></div>
                        <div><button class="btn-primary" onclick="window.verDetalhes('${g.id}', '${g.numero}')" style="width:auto; padding:8px 12px;">👁 Ver Processos e Caixas</button></div>`;
                    div.appendChild(card);
                });
                container.appendChild(btn); container.appendChild(div);
            });
        }

        window.verDetalhes = async (id, num) => {
            const grid = document.getElementById("detalhesGuiaGrid");
            document.getElementById("modalTitulo").innerText = "Processos da Guia " + num;
            document.getElementById("modalDetalhes").style.display = "block";
            grid.innerHTML = "Carregando...";

            try {
                const docsSnap = await getDocs(collection(db, "guias", id, "processos"));
                let html = `<table style="width:100%; border-collapse: collapse;">
                    <thead><tr style="background:var(--primary); color:white;">
                        <th style="padding:10px; border:1px solid #ddd;">Processo</th>
                        <th style="padding:10px; border:1px solid #ddd;">📦 CAIXA DO PROCESSO</th>
                        <th style="padding:10px; border:1px solid #ddd;">Interessado</th>
                    </tr></thead><tbody>`;

                docsSnap.forEach(docItem => {
                    const p = docItem.data();
                    html += `<tr>
                        <td style="padding:10px; border:1px solid #ddd;">${p.numeroProcessoFisico}</td>
                        <td style="padding:10px; border:1px solid #ddd; text-align:center; font-weight:bold; color:red;">${p.locCaixaProc || 'Não inf.'}</td>
                        <td style="padding:10px; border:1px solid #ddd;">${p.interessado}</td>
                    </tr>`;
                });
                grid.innerHTML = html + "</tbody></table>";
            } catch (e) { grid.innerHTML = "Erro."; }
        };

        document.getElementById("closeModal").onclick = () => document.getElementById("modalDetalhes").style.display = "none";
    </script>
</body>
</html>

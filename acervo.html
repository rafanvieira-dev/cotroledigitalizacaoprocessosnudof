<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta Acervo - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .guia-card-arquivada { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #7f8c8d; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .data-header-btn { width: 100%; color: white; padding: 12px; border: none; border-radius: 5px; text-align: left; font-weight: bold; margin: 10px 0 5px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .btn-caixa { background: var(--secondary); font-size: 1.1em; margin-bottom: 5px; }
        .btn-caixa:hover { opacity: 0.9; }
        .grupo-caixa { display: none; margin-bottom: 25px; padding-left: 15px; border-left: 3px dashed #bdc3c7; margin-left: 10px; padding-top: 10px; }
        .btn-caixa-docs { background: var(--primary); font-size: 1em; margin-bottom: 5px; margin-left: 10px; width: calc(100% - 10px); }
        .grupo-caixa-docs { display: none; margin-bottom: 15px; padding-left: 15px; border-left: 3px dotted #bdc3c7; margin-left: 20px; padding-top: 10px; }
        .contador-guias { background: var(--accent); color: #333; padding: 3px 12px; border-radius: 12px; font-size: 0.85em; margin-left: 10px; font-weight: bold; }
        .dash-card { background: #eafaea; padding: 20px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid var(--border); }
        .dash-card h4 { margin: 0; color: var(--primary); font-size: 1.1em; }
        .dash-card h2 { margin: 10px 0 0 0; font-size: 2.5em; color: var(--secondary); }
    </style>
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">PROCESSOS NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="processos.html">📄 Inserir Processos</a>
                <a href="digitalizacao.html">🖨️ Digitalização e SEI</a>
                <a href="arquivamentoFisico.html">🗄️ Arquivar Físico</a>
                <a href="acervo.html" class="ativo">📚 Consulta de Acervo</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Consulta de Acervo por Caixas Físicas</h2>
            <div class="form-container">
                <input type="text" id="buscaGuiaInput" placeholder="🔍 Buscar por Nº Guia ou Unidade..." oninput="window.filtrarAcervo()">
                <button class="btn-primary" onclick="window.abrirDashboard()" style="width: auto; background: #8e44ad;">📊 Dashboard de Produção</button>
            </div>
            <div id="listaArquivadas"><p>Buscando acervo...</p></div>
        </main>
    </div>

    </body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Guias de Remessa</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos básicos para a tabela, pode adicionar ao seu style.css depois */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .container-lista { max-width: 1000px; margin: 0 auto; padding: 20px; }
    </style>
</head>
<body>
    <div class="container-lista">
        <a href="index.html" style="text-decoration: none; color: #555;">&larr; Voltar ao Menu</a>
        <h1>Guias de Remessa Registadas</h1>
        
        <table>
            <thead>
                <tr>
                    <th>Nº Guia</th>
                    <th>Unidade Solicitante</th>
                    <th>Data de Receção</th>
                    <th>Status</th>
                    <th>Caixa</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela-guias">
                </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>

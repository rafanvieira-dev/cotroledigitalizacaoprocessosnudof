<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Processos Físicos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .container-lista { max-width: 1200px; margin: 0 auto; padding: 20px; }
    </style>
</head>
<body>
    <div class="container-lista">
        <a href="index.html" style="text-decoration: none; color: #555;">&larr; Voltar ao Menu</a>
        <h1>Processos Físicos Registados</h1>
        
        <table>
            <thead>
                <tr>
                    <th>Nº Processo</th>
                    <th>Guia Vinculada</th>
                    <th>Interessado</th>
                    <th>Assunto</th>
                    <th>Status</th>
                    <th>Data Inserção SEI</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela-processos">
                </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>

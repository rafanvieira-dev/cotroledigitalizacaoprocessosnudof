    <script>
        window.mascaraData = function(input) {
            let v = input.value.replace(/\D/g, '');
            if (v.length > 8) v = v.slice(0, 8);
            if (v.length >= 5) { input.value = `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`; } 
            else if (v.length >= 3) { input.value = `${v.slice(0, 2)}/${v.slice(2)}`; } 
            else { input.value = v; }
        };
    </script>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, addDoc, updateDoc, doc, deleteDoc, getDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const EMAILS_ADMIN = ["rafael.nascimento-vieira@defensoria.rj.def.br"];
        let isAdmin = false;
        let guiaAtivaId = "";
        let processoEditandoId = null;

        onAuthStateChanged(auth, (user) => { 
            if (!user) window.location.href = "index.html"; 
            else {
                isAdmin = EMAILS_ADMIN.includes(user.email);
                carregarGuias(); 
            }
        });

        async function carregarGuias() {
            const lista = document.getElementById("listaGuias");
            const q = query(collection(db, "guias"), where("status", "==", "Aberta"));
            const snap = await getDocs(q);
            lista.innerHTML = snap.empty ? "<p>Não há guias abertas.</p>" : "";
            snap.forEach(d => {
                const btn = document.createElement("button");
                btn.className = "btn-guia-item";
                btn.style.cssText = "background:var(--primary); color:white; padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer;";
                btn.innerText = `Guia: ${d.data().numero}`;
                btn.onclick = () => window.abrirGuia(d.id, d.data().numero);
                lista.appendChild(btn);
            });
        }

        window.abrirGuia = async (id, num) => {
            guiaAtivaId = id;
            document.getElementById("areaProcessos").style.display = "block";
            document.getElementById("tituloGuia").innerText = `Registrar na Guia: ${num}`;
            await atualizarContador(id);
            await window.atualizarLista(id);
        };

        async function atualizarContador(id) {
            const snap = await getDocs(collection(db, "guias", id, "processos"));
            const total = snap.size;
            const p = document.getElementById("contadorProcs");
            const btn = document.getElementById("btnSalvar");
            p.innerText = `${total} / 6 processos cadastrados`;
            
            if (total >= 6 && !processoEditandoId) {
                p.style.color = "#e74c3c";
                btn.disabled = true;
                btn.innerText = "LIMITE DE 6 ATINGIDO";
            } else {
                p.style.color = "var(--secondary)";
                btn.disabled = false;
                if (!processoEditandoId) btn.innerText = "Gravar Processo";
            }
            return total;
        }

        window.fecharArea = () => {
            document.getElementById("areaProcessos").style.display = "none";
            guiaAtivaId = ""; processoEditandoId = null;
            document.getElementById("formProcesso").reset();
            const btn = document.getElementById("btnSalvar");
            btn.innerText = "Gravar Processo";
            btn.style.cssText = "background:var(--primary); color:white;";
        };

        window.atualizarLista = async (id) => {
            const container = document.getElementById("listaProcessosUI");
            const qDocs = query(collection(db, "guias", id, "processos"), orderBy("dataInsercao", "asc"));
            const snap = await getDocs(qDocs);
            container.innerHTML = ""; 
            let i = 1;
            snap.forEach(dSnap => {
                const p = dSnap.data();
                let btnExcluir = isAdmin ? `<button type="button" onclick="window.excluirProcesso('${dSnap.id}')" style="background:#e74c3c; color:white; padding:8px 12px; border:none; border-radius:4px; cursor:pointer; margin-left:5px; font-weight:bold;">🗑️ Excluir</button>` : "";

                container.innerHTML += `<li style="padding:15px; background:#f8f9fa; border-left:4px solid var(--primary); margin-bottom:10px; border-radius:4px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong>${i++}º. Proc: ${p.numeroProcessoFisico}</strong><br>
                        <small>Interessado: ${p.interessado} | Assunto: ${p.assunto} | Folhas: ${p.qtdFolhas}</small>
                    </div>
                    <div>
                        <button type="button" onclick="window.editarProcesso('${dSnap.id}')" style="background:var(--accent); color:#333; padding:8px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">✏️ Editar</button>
                        ${btnExcluir}
                    </div>
                </li>`;
            });
        };

        const converterISOParaData = (iso) => {
            if (!iso) return "";
            const partes = iso.split('-');
            return partes.length === 3 ? `${partes[2]}/${partes[1]}/${partes[0]}` : iso;
        };

        window.editarProcesso = async (procId) => {
            try {
                const docRef = doc(db, "guias", guiaAtivaId, "processos", procId);
                const procSnap = await getDoc(docRef);
                if (procSnap.exists()) {
                    const p = procSnap.data();
                    document.getElementById("numeroProcessoFisico").value = p.numeroProcessoFisico;
                    document.getElementById("dataAbertura").value = converterISOParaData(p.dataAbertura);
                    document.getElementById("dataRecebimentoProc").value = converterISOParaData(p.dataRecebimentoProc);
                    document.getElementById("assunto").value = p.assunto;
                    document.getElementById("interessado").value = p.interessado;
                    document.getElementById("qtdFolhas").value = p.qtdFolhas;
                    document.getElementById("tipoProcessoSei").value = p.tipoProcessoSei;

                    processoEditandoId = procId;
                    const btn = document.getElementById("btnSalvar");
                    btn.disabled = false;
                    btn.innerText = "🔄 ATUALIZAR PROCESSO";
                    btn.style.cssText = "background:var(--accent); color:#333;";
                    window.scrollTo({ top: 0, behavior: 'smooth' }); 
                }
            } catch (err) { alert("Erro ao carregar dados."); }
        };

        window.excluirProcesso = async (procId) => {
            if(confirm("Deseja excluir este processo?")) {
                try {
                    await deleteDoc(doc(db, "guias", guiaAtivaId, "processos", procId));
                    await atualizarContador(guiaAtivaId);
                    await window.atualizarLista(guiaAtivaId);
                } catch (err) { alert("Erro ao excluir."); }
            }
        };

        const converterDataParaISO = (dataBr) => {
            if (!dataBr) return "";
            const partes = dataBr.split('/');
            return partes.length === 3 ? `${partes[2]}-${partes[1]}-${partes[0]}` : dataBr;
        };

        document.getElementById("formProcesso").onsubmit = async (e) => {
            e.preventDefault();
            const dataAb = document.getElementById("dataAbertura").value;
            const dataRec = document.getElementById("dataRecebimentoProc").value;
            const tipoSei = document.getElementById("tipoProcessoSei").value.toUpperCase(); // Garante o salvamento em caixa alta
            
            if (dataAb.length < 10 || dataRec.length < 10) return alert("Preencha as datas completamente.");

            if (processoEditandoId) {
                try {
                    await updateDoc(doc(db, "guias", guiaAtivaId, "processos", processoEditandoId), {
                        numeroProcessoFisico: document.getElementById("numeroProcessoFisico").value,
                        dataAbertura: converterDataParaISO(dataAb),
                        dataRecebimentoProc: converterDataParaISO(dataRec),
                        assunto: document.getElementById("assunto").value,
                        interessado: document.getElementById("interessado").value,
                        qtdFolhas: document.getElementById("qtdFolhas").value,
                        tipoProcessoSei: tipoSei
                    });
                    processoEditandoId = null;
                    document.getElementById("btnSalvar").innerText = "Gravar Processo";
                    document.getElementById("formProcesso").reset();
                    await atualizarContador(guiaAtivaId);
                    await window.atualizarLista(guiaAtivaId);
                } catch (err) { alert("Erro ao atualizar."); }
            } else {
                try {
                    const dataRecGuardar = document.getElementById("dataRecebimentoProc").value;
                    await addDoc(collection(db, "guias", guiaAtivaId, "processos"), {
                        numeroProcessoFisico: document.getElementById("numeroProcessoFisico").value,
                        dataAbertura: converterDataParaISO(dataAb),
                        dataRecebimentoProc: converterDataParaISO(dataRec),
                        assunto: document.getElementById("assunto").value,
                        interessado: document.getElementById("interessado").value,
                        qtdFolhas: document.getElementById("qtdFolhas").value,
                        tipoProcessoSei: tipoSei,
                        dataInsercao: serverTimestamp(),
                        inseridoPor: auth.currentUser.email
                    });
                    document.getElementById("formProcesso").reset();
                    document.getElementById("dataRecebimentoProc").value = dataRecGuardar;
                    await atualizarContador(guiaAtivaId);
                    await window.atualizarLista(guiaAtivaId);
                } catch (err) { alert("Erro ao salvar."); }
            }
        };

        document.getElementById("btnLogout").onclick = () => signOut(auth);
    </script>
</body>
</html>
